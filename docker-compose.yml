name: urba-discord-bot

services:
  discord-bot:
    build:
      context: .
    container_name: urba-discord-bot
    restart: unless-stopped
    env_file:
      - /opt/urba-apps/discord-bot/.env
    environment:
      NODE_ENV: production
      HEALTH_HOST: 0.0.0.0
      HEALTH_PORT: 4188
      LEGENDS_STORE_PATH: /shared/legends-tracking.json
      LEGENDS_TRACK_INTERVAL_MS: 120000
      ELDER_STORE_PATH: /shared/elder-votes.json
      PICTIONARY_STORE_PATH: /shared/pictionary-leaderboard.json
      DISCORD_CODEX_CHANNEL_ID: "1523893930993778698"
      DISCORD_CODEX_WORKER_JOB_DIR: /shared/codex-worker/jobs
      DISCORD_FILE_CONTEXT_DIR: /shared/codex-worker/context/discord-files
      DISCORD_ATTACHMENT_DOWNLOAD_MAX_BYTES: 26214400
      DISCORD_CODEX_WORKER_DEBOUNCE_MS: 3500
    volumes:
      - /opt/urba-apps/discord-bot/shared:/shared
    ports:
      - "127.0.0.1:4188:4188"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4188/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  slack-bridge:
    profiles: ["legacy-slack"]
    build:
      context: .
    container_name: urba-slack-bridge
    restart: unless-stopped
    command: ["node", "src/slack-bridge.mjs"]
    env_file:
      - /opt/urba-apps/discord-bot/slack-bridge.env
    environment:
      NODE_ENV: production
      SLACK_BRIDGE_HOST: 0.0.0.0
      SLACK_BRIDGE_PORT: 4190
      SLACK_BRIDGE_EVENT_PATH: /slack/events
      SLACK_MEMORY_PATH: /shared/slack-memory.jsonl
      SLACK_CODEX_WORKER_JOB_DIR: /shared/codex-worker/jobs
      SLACK_CONTEXT_PATH: /app/docs/context/operating-memory.md
    ports:
      - "127.0.0.1:4190:4190"
    volumes:
      - /opt/urba-apps/discord-bot/shared:/shared
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('node:http').get('http://127.0.0.1:4190/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  codex-worker:
    profiles: ["codex-worker"]
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: urba-codex-worker
    restart: unless-stopped
    env_file:
      - /opt/urba-apps/discord-bot/.env
      - /opt/urba-apps/discord-bot/slack-bridge.env
    environment:
      NODE_ENV: production
      CODEX_HOME: /codex-home
      DISCORD_CODEX_CHANNEL_ID: "1523893930993778698"
      SLACK_WORKER_SHARED_DIR: /shared/codex-worker
      SLACK_WORKER_JOB_DIR: /shared/codex-worker/jobs
      SLACK_WORKER_CONTEXT_DIR: /shared/codex-worker/context
      SLACK_WORKER_REPO_DIR: /shared/codex-worker/repo
      SLACK_WORKER_LIVE_APP_DIR: /live-app
      SLACK_WORKER_BOT_HEALTH_URL: http://discord-bot:4188/healthz
      SLACK_WORKER_REQUIRE_BRIDGE_HEALTH: "0"
    volumes:
      - /opt/urba-apps/discord-bot/shared:/shared
      - /opt/urba-apps/discord-bot/codex-home:/codex-home
      - /opt/urba-apps/discord-bot/app:/live-app:ro
    depends_on:
      - discord-bot
    security_opt:
      - no-new-privileges:true
    init: true
