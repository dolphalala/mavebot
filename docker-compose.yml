name: urba-discord-bot

services:
  discord-bot:
    build:
      context: .
    container_name: urba-discord-bot
    restart: unless-stopped
    env_file:
      - /opt/urba-apps/discord-bot/.env
    environment:
      NODE_ENV: production
      HEALTH_HOST: 0.0.0.0
      HEALTH_PORT: 4188
    ports:
      - "127.0.0.1:4188:4188"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4188/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
