name: urba-discord-bot

x-node-app-image: &node-app-image
  build:
    context: .
  image: urba-discord-bot-app:latest

services:
  discord-bot:
    <<: *node-app-image
    container_name: urba-discord-bot
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 768m
    cpus: "1.0"
    pids_limit: 256
    env_file:
      - /opt/urba-apps/discord-bot/.env
    environment:
      NODE_ENV: production
      HEALTH_HOST: 0.0.0.0
      HEALTH_PORT: 4188
      LEGENDS_STORE_PATH: /shared/legends-tracking.json
      LEGENDS_TRACK_INTERVAL_MS: 120000
      ELDER_STORE_PATH: /shared/elder-votes.json
      PICTIONARY_STORE_PATH: /shared/pictionary-leaderboard.json
      DISCORD_CODEX_CHANNEL_ID: "1523893930993778698"
      DISCORD_CODEX_WORKER_JOB_DIR: /shared/codex-worker/jobs
      DISCORD_FILE_CONTEXT_DIR: /shared/codex-worker/context/discord-files
      DISCORD_ATTACHMENT_DOWNLOAD_MAX_BYTES: 26214400
      DISCORD_CODEX_WORKER_DEBOUNCE_MS: 3500
    volumes:
      - /opt/urba-apps/discord-bot/shared:/shared
    ports:
      - "127.0.0.1:4188:4188"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4188/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  base-marketplace-db:
    image: postgres:16-alpine
    container_name: urba-base-marketplace-db
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 512m
    cpus: "0.75"
    pids_limit: 128
    environment:
      POSTGRES_DB: base_marketplace
      POSTGRES_USER: base_marketplace
      POSTGRES_PASSWORD_FILE: /run/secrets/base_marketplace_db_password
    secrets:
      - base_marketplace_db_password
    volumes:
      - base-marketplace-db:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U base_marketplace -d base_marketplace"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  base-marketplace-web:
    image: urba-discord-bot-app:latest
    container_name: urba-base-marketplace-web
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 512m
    cpus: "0.75"
    pids_limit: 128
    environment:
      NODE_ENV: production
      SITE_HOST: 0.0.0.0
      SITE_PORT: 4192
      BASE_MARKETPLACE_DB_HOST: base-marketplace-db
      BASE_MARKETPLACE_DB_PORT: 5432
      BASE_MARKETPLACE_DB_NAME: base_marketplace
      BASE_MARKETPLACE_DB_USER: base_marketplace
      BASE_MARKETPLACE_DB_PASSWORD_FILE: /run/secrets/base_marketplace_db_password
    secrets:
      - base_marketplace_db_password
    ports:
      - "4192:4192"
    depends_on:
      base-marketplace-db:
        condition: service_healthy
    command: ["node", "src/site-server.mjs"]
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4192/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  codex-worker:
    profiles: ["codex-worker"]
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: urba-codex-worker
    restart: unless-stopped
    mem_limit: 1024m
    memswap_limit: 1536m
    cpus: "1.25"
    pids_limit: 512
    env_file:
      - /opt/urba-apps/discord-bot/.env
      - /opt/urba-apps/discord-bot/codex-worker.env
    environment:
      NODE_ENV: production
      CODEX_HOME: /codex-home
      DISCORD_CODEX_CHANNEL_ID: "1523893930993778698"
      CODEX_WORKER_SHARED_DIR: /shared/codex-worker
      CODEX_WORKER_JOB_DIR: /shared/codex-worker/jobs
      CODEX_WORKER_CONTEXT_DIR: /shared/codex-worker/context
      CODEX_WORKER_REPO_DIR: /shared/codex-worker/repo
      CODEX_WORKER_LIVE_APP_DIR: /live-app
      CODEX_WORKER_BOT_HEALTH_URL: http://discord-bot:4188/healthz
      CODEX_WORKER_REQUIRE_BRIDGE_HEALTH: "0"
    volumes:
      - /opt/urba-apps/discord-bot/shared:/shared
      - /opt/urba-apps/discord-bot/codex-home:/codex-home
      - /opt/urba-apps/discord-bot/app:/live-app:ro
    depends_on:
      - discord-bot
    security_opt:
      - no-new-privileges:true
    init: true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  base-marketplace-db:

secrets:
  base_marketplace_db_password:
    file: /opt/urba-apps/discord-bot/shared/base-marketplace-db-password
